<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>憑證卡登入 - 機構典藏系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.css') }}">
    <style>
        body.theme-dark {
            background-color: #0f172a;
        }
        body.theme-dark .login-container {
            background-color: #1e293b;
            color: #f8fafc;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        body.theme-dark .login-container h2 {
            color: #60a5fa !important;
        }
        body.theme-dark .fallback-link {
            color: #94a3b8 !important;
            border-top-color: #334155 !important;
        }
        .error-msg { 
            color: #dc2626; 
            background: #ffe4e6; 
            border: 1px solid #fecdd3;
            padding: 0.8rem; 
            border-radius: 6px; 
            margin-bottom: 1.5rem; 
            font-size: 0.95rem;
            text-align: left;
        }
        .login-container { 
            max-width: 400px; 
            margin: 10rem auto; 
            padding: 3rem 2rem; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            text-align: center;
        }
        .card-reader-icon {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .fallback-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            width: 100%;
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .fallback-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body class="theme-{{ portal_config.system_theme or 'light' }}" style="background-color: #f8fafc;">
    <div class="login-container">
        <h2 style="color: var(--primary-color); margin-bottom: 1rem;">智慧憑證登入系統</h2>
        
        {% if error %}
        <div class="error-msg">️ {{ error }}</div>
        {% endif %}
        
        <div class="card-reader-icon">
            <i class="bi bi-credit-card-2-front"></i>
        </div>
        
        <h4 style="margin-bottom: 1rem;">請插入您的員工憑證卡</h4>
        <p style="color: #64748b; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem;">
            本系統已啟用公司內部 OAuth 2.0 憑證單一登入安全驗證協定。<br>請確保您的憑證卡已正確插入讀卡機，並點擊下方按鈕進行驗證。
        </p>

        <!-- 憑證單一登入按鈕 -->
        <a href="{{ url_for('auth.sso_redirect') }}" class="btn" style="display: block; width: 100%; text-decoration: none; padding: 0.8rem; font-weight: bold; background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 6px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3); transition: all 0.3s; margin-top: 1rem;">
            <i class="bi bi-shield-lock-fill"></i> 啟動憑證卡單一登入
        </a>
        
        <a href="{{ url_for('auth.login', fallback='true') }}" class="fallback-link">
            <i class="bi bi-keyboard"></i> 開發測試階段：切換為帳號密碼登入
        </a>
    </div>
</body>
</html>
