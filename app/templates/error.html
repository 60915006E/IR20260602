{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 80px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-top: 5px solid #ef4444; text-align: center;">
    <div style="font-size: 3rem; color: #ef4444; margin-bottom: 20px;">
        <i class="bi bi-exclamation-circle-fill"></i>
    </div>
    <h3 style="color: #1f2937; font-weight: 800; margin-bottom: 15px; font-family: 'Outfit', sans-serif;">下載要求遭拒</h3>
    <p style="color: #4b5563; font-size: 1.05rem; line-height: 1.7; margin-bottom: 30px;">
        {{ error_msg }}
    </p>
    <div style="display: flex; gap: 15px; justify-content: center;">
        <a href="javascript:window.close();" class="btn" style="background-color: #6b7280; color: white; padding: 10px 24px; font-weight: bold; border-radius: 6px; text-decoration: none;">關閉此視窗</a>
        <a href="{{ url_for('search.index') }}" class="btn" style="background-color: #4f46e5; color: white; padding: 10px 24px; font-weight: bold; border-radius: 6px; text-decoration: none;">返回首頁</a>
    </div>
</div>
{% endblock %}
