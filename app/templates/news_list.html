{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 900px; padding: 20px; margin-top: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
        <div>
            <h2 class="fw-bold" style="color: var(--primary-color); margin: 0; font-family: 'Outfit', sans-serif;">
                <i class="bi bi-newspaper"></i> 最新消息與公告中心
            </h2>
            <p class="text-muted" style="margin: 5px 0 0; font-size: 0.95rem;">
                獲取本系統之最新消息、資料同步狀態與重要系統公告。
            </p>
        </div>
        <a href="{{ url_for('search.index') }}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-house"></i> 返回首頁
        </a>
    </div>

    <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px;">
        {% for news in news_list %}
        <div class="card" style="background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 24px; transition: transform 0.2s, box-shadow 0.2s; border-left: 5px solid var(--primary-color);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 15px -3px rgba(0,0,0,0.1)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.05)';">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 class="fw-bold" style="color: #1e293b; margin: 0; font-size: 1.25rem;">{{ news.title }}</h4>
                <span class="badge bg-light text-dark" style="font-size: 0.8rem; padding: 5px 10px; border: 1px solid #e2e8f0;">公告</span>
            </div>
            <p style="color: #475569; font-size: 1rem; line-height: 1.7; margin: 0; white-space: pre-line;">
                {{ news.content }}
            </p>
        </div>
        {% else %}
        <div class="text-center text-muted" style="padding: 50px; background: white; border-radius: 12px; border: 1px dashed #cbd5e1;">
            <i class="bi bi-inbox" style="font-size: 3rem; color: #94a3b8; display: block; margin-bottom: 10px;"></i>
            目前尚無任何公告與最新消息。
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
