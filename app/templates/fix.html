<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網站維護作業中 - 機構典藏系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .maintenance-card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid #ef4444;
        }
        .icon-container {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #0f172a;
            font-weight: 700;
        }
        p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        
        /* 黑暗模式相容 */
        body.theme-dark, body.admin-dark-mode {
            background-color: #18181b !important;
            color: #f4f4f5 !important;
        }
        body.theme-dark .maintenance-card, body.admin-dark-mode .maintenance-card {
            background: #27272a !important;
            border-color: #ef4444 !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important;
        }
        body.theme-dark h1, body.admin-dark-mode h1 {
            color: #ffffff !important;
        }
        body.theme-dark p, body.admin-dark-mode p {
            color: #cbd5e1 !important;
        }
    </style>
</head>
<body class="theme-{{ portal_config.system_theme or 'light' }}">
    <div class="maintenance-card">
        <div class="icon-container">
            <i class="bi bi-cone-striped"></i>
        </div>
        <h1>網站維護中</h1>
        <p>
            系統目前正在進行例行性的資料庫維護作業以提升安全性與檢索效能。
            <br>
            我們深感抱歉為您帶來的不便，請稍候再行存取。
        </p>
        <div style="font-size: 0.85rem; color: #94a3b8;">
            本系統服務窗口：分機 172、870
        </div>
    </div>
</body>
</html>
