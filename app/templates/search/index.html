{% extends "search/layout.html" %}

{% block content %}
<h2>一般關鍵字搜尋</h2>
<p>請輸入任意關鍵字，將跨表單（標題、作者、關鍵字等）進行關鍵字查詢。</p>

<form action="{{ url_for('search_test.results') }}" method="POST">
    <div class="form-group">
        <label for="keyword">關鍵字：</label>
        <input type="text" id="keyword" name="keyword" placeholder="請輸入搜尋值..." required>
    </div>
    <button type="submit" class="btn">搜尋</button>
</form>

<hr style="margin-top: 30px;">
<p style="color: #666; font-size: 0.9em;">
    <strong>備註：</strong>此為測試模組首頁，若需特定欄位查詢請前往 <a href="{{ url_for('search_test.advanced_search') }}">進階搜尋</a>。
</p>
{% endblock %}
